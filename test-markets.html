<!DOCTYPE html>
<html>
<head>
    <title>Markets API Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .success { color: green; }
        .error { color: red; }
        pre { background: #f5f5f5; padding: 10px; overflow: auto; }
    </style>
</head>
<body>
    <h1>Markets API Connection Test</h1>
    <button onclick="testBackend()">Test Backend Connection</button>
    <div id="result"></div>

    <script>
        async function testBackend() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<p>Testing backend connection...</p>';
            
            try {
                console.log('🔄 Fetching from backend...');
                const response = await fetch('http://localhost:3001/api/markets');
                console.log('📡 Response received:', response);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                console.log('📦 Data received:', data);
                
                resultDiv.innerHTML = `
                    <h2 class="success">✅ Backend Connection Successful!</h2>
                    <p><strong>Fetched ${data.length} assets</strong></p>
                    <h3>First 3 Assets:</h3>
                    <pre>${JSON.stringify(data.slice(0, 3), null, 2)}</pre>
                    <h3>Full Response (first 1000 chars):</h3>
                    <pre>${JSON.stringify(data, null, 2).substring(0, 1000)}...</pre>
                `;
                
            } catch (error) {
                console.error('❌ Error:', error);
                resultDiv.innerHTML = `
                    <h2 class="error">❌ Backend Connection Failed</h2>
                    <p><strong>Error:</strong> ${error.message}</p>
                    <p><strong>Make sure:</strong></p>
                    <ul>
                        <li>Backend server is running on port 3001</li>
                        <li>Run: <code>cd server && npm run dev</code></li>
                        <li>Check backend terminal for errors</li>
                    </ul>
                `;
            }
        }
        
        // Auto-test on load
        window.onload = () => {
            testBackend();
        };
    </script>
</body>
</html>
